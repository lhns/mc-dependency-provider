modLoader = "mclibprovider"
loaderVersion = "[1,)"
license = "Apache-2.0"
issueTrackerURL = "https://gitea.lhns.de/lhns/mc-lib-provider/issues"

[[mods]]
modId = "neoforge_example"
version = "${version}"
displayName = "mc-lib-provider NeoForge example"
description = "Smoke-test mod that exercises the mc-lib-provider Scala entrypoint + Maven dep resolution path on NeoForge."
authors = "mc-lib-provider contributors"
# mc-lib-provider-specific property read by McLibLanguageLoader.loadEntryClass.
# Must be fully qualified — the class is resolved through the mod's per-mod ModClassLoader.
entrypoint = "com.example.ExampleMod"

[[dependencies.neoforge_example]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.neoforge_example]]
modId = "mclibprovider"
type = "required"
versionRange = "[0.1,)"
ordering = "BEFORE"
side = "BOTH"

[[dependencies.neoforge_example]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "BOTH"
