[versions]
maven-resolver = "1.9.22"
maven-resolver-provider = "3.9.9"
junit = "5.11.3"
jetbrains-annotations = "26.0.1"
shadow = "8.3.5"
fabric-loader = "0.16.9"
neoforge-spi = "9.0.2"            # NeoForge 21.x (MC 1.21.x)
neoforge-spi-mc1206 = "8.0.4"     # NeoForge 20.6.x (MC 1.20.6)
neoforge-spi-mc261 = "9.0.2"      # NeoForge 26.1.x (MC 26.1) — same SPI line as 21.x for now
neoforge-fml-loader = "4.0.42"
neoforge-bus = "8.0.5"
# Forge 1.18.2 — forgespi 4.0.x is the SPI surface (IModLanguageProvider,
# ModFileScanData, IModInfo, etc.). Pinned to 4.0.11 (latest 4.0.x at time of writing).
forge-spi-mc117 = "3.2.3"
forge-spi-mc118 = "4.0.11"
forge-spi-mc120 = "7.1.6"
forge-fmlcore-mc117 = "1.17.1-37.1.2"
forge-fmlcore-mc118 = "1.18.2-40.3.12"
forge-fmlcore-mc120 = "1.20.1-47.4.20"
asm = "9.7.1"
vanniktech-maven-publish = "0.32.0"

[libraries]
maven-resolver-supplier = { module = "org.apache.maven.resolver:maven-resolver-supplier", version.ref = "maven-resolver" }
maven-resolver-provider = { module = "org.apache.maven:maven-resolver-provider", version.ref = "maven-resolver-provider" }

junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }

jetbrains-annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrains-annotations" }

fabric-loader = { module = "net.fabricmc:fabric-loader", version.ref = "fabric-loader" }
neoforge-spi = { module = "net.neoforged:neoforgespi", version.ref = "neoforge-spi" }
neoforge-spi-mc1206 = { module = "net.neoforged:neoforgespi", version.ref = "neoforge-spi-mc1206" }
neoforge-spi-mc261 = { module = "net.neoforged:neoforgespi", version.ref = "neoforge-spi-mc261" }
neoforge-fml-loader = { module = "net.neoforged.fancymodloader:loader", version.ref = "neoforge-fml-loader" }
neoforge-bus = { module = "net.neoforged:bus", version.ref = "neoforge-bus" }
forge-spi-mc117 = { module = "net.minecraftforge:forgespi", version.ref = "forge-spi-mc117" }
forge-spi-mc118 = { module = "net.minecraftforge:forgespi", version.ref = "forge-spi-mc118" }
forge-spi-mc120 = { module = "net.minecraftforge:forgespi", version.ref = "forge-spi-mc120" }
forge-fmlcore-mc117 = { module = "net.minecraftforge:fmlcore", version.ref = "forge-fmlcore-mc117" }
forge-fmlcore-mc118 = { module = "net.minecraftforge:fmlcore", version.ref = "forge-fmlcore-mc118" }
forge-fmlcore-mc120 = { module = "net.minecraftforge:fmlcore", version.ref = "forge-fmlcore-mc120" }

asm = { module = "org.ow2.asm:asm", version.ref = "asm" }
asm-tree = { module = "org.ow2.asm:asm-tree", version.ref = "asm" }
asm-commons = { module = "org.ow2.asm:asm-commons", version.ref = "asm" }
asm-util = { module = "org.ow2.asm:asm-util", version.ref = "asm" }

[plugins]
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
vanniktech-maven-publish = { id = "com.vanniktech.maven.publish", version.ref = "vanniktech-maven-publish" }
